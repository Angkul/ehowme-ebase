name: Release Theme ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build theme ZIP
        run: |
          cd ..
          zip -r "ehowme-ebase-${{ steps.version.outputs.VERSION }}.zip" ehowme-ebase \
            --exclude "ehowme-ebase/.git/*" \
            --exclude "ehowme-ebase/.github/*" \
            --exclude "ehowme-ebase/.gitattributes" \
            --exclude "ehowme-ebase/.gitignore" \
            --exclude "ehowme-ebase/.DS_Store" \
            --exclude "ehowme-ebase/desktop.ini" \
            --exclude "ehowme-ebase/ebase-config.php" \
            --exclude "ehowme-ebase/release.sh" \
            --exclude "ehowme-ebase/*.zip"
          mv "ehowme-ebase-${{ steps.version.outputs.VERSION }}.zip" ehowme-ebase/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ehowme-ebase-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
